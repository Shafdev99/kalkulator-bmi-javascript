<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kalkulator BMI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body class="background-mixer-utama">
    <!-- Konten -->
    <div class="row mt-4">
        <div class="col-10 col-lg-4 col-md-4 mx-auto">
            <div class="card shadow p-3">
                <!-- Judul -->
                <h4 class="text-center mt-2 mb-3 fw-bold">Kalkulator BMI</h4>

                <!-- Tinggi Badan -->
                <label for="">Tinggi badan</label>
                <div class="d-flex align-items-center mb-3">
                    <input type="number" class="form-control mt-2 me-2" name="tinggi_badan" id="tinggi-badan"
                        placeholder="Silakan isi tinggi badanmu!" aria-placeholder="Silakan isi tinggi badanmu!">
                    cm
                </div>

                <!-- Berat Badan -->
                <label for="">Berat Badan</label>
                <div class="d-flex align-items-center mb-4">
                    <input type="number" class="form-control mt-2 me-2" name="berat_badan" id="berat-badan"
                        placeholder="Silakan isi berat badanmu!" aria-placeholder="Silakan isi berat badanmu!">
                    kg
                </div>

                <!-- Tombol Hitung -->
                <button class="btn btn-primary fw-bold mb-3" id="tombol-hitung">
                    Hitung
                </button>

                <!-- Hasil Perhitungan -->
                <div id="hasil-perhitungan">
                    <!-- Hasilnya nanti akan ditampilkan disini! -->

                </div>
            </div>
        </div>
    </div>

    <script src=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
